<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMLinks</title>

<link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/8/88/USAF_Air_Mobility_Liaison_Officer_Beret_Flash.svg/960px-USAF_Air_Mobility_Liaison_Officer_Beret_Flash.svg.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#0b0f1a;
    --panel:#111827;
    --card:#1a2235;
    --border:#1f2d45;
    --text:#e2e8f0;
    --muted:#64748b;
    --accent:#38bdf8;
    --accent2:#0ea5e9;
    --danger:#f43f5e;
    --success:#34d399;
    --todo:#a78bfa;
    --shadow:0 4px 24px rgba(0,0,0,.4);
    --header-height:64px;
}

.light{
    --bg:#f0f4f8;
    --panel:#ffffff;
    --card:#f8fafc;
    --border:#cbd5e1;
    --text:#0f172a;
    --muted:#64748b;
    --accent:#0284c7;
    --accent2:#0369a1;
    --danger:#e11d48;
    --success:#059669;
    --todo:#7c3aed;
    --shadow:0 4px 16px rgba(0,0,0,.08);
}

*{ box-sizing:border-box; margin:0; padding:0; }

body{
    background:var(--bg);
    color:var(--text);
    font-family:'IBM Plex Sans',sans-serif;
    transition:background .2s,color .2s;
    min-height:100vh;
}

/* subtle grid bg */
body::before{
    content:'';
    position:fixed;
    inset:0;
    background-image:
        linear-gradient(rgba(56,189,248,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,.03) 1px, transparent 1px);
    background-size:32px 32px;
    pointer-events:none;
    z-index:0;
}

header{
    position:sticky;
    top:0;
    z-index:100;
    height:var(--header-height);
    background:rgba(11,15,26,.92);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    padding:0 20px;
    display:flex;
    align-items:center;
    gap:14px;
    flex-wrap:wrap;
}

.light header{
    background:rgba(255,255,255,.92);
}

.logo-wrap{
    display:flex;
    align-items:center;
    gap:10px;
    flex-shrink:0;
}

.logo{
    width:28px;
    height:28px;
    object-fit:contain;
}

.site-title{
    font-family:'IBM Plex Mono',monospace;
    font-weight:600;
    font-size:18px;
    letter-spacing:-.5px;
    color:var(--accent);
}

.flipped{ display:inline-block; transform:scaleX(-1); }

.toolbar{
    margin-left:auto;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
}

button,input{
    border:none;
    outline:none;
    font-family:inherit;
}

button{
    background:var(--accent);
    color:#fff;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    font-weight:600;
    font-size:13px;
    transition:.15s;
    white-space:nowrap;
}

button:hover{ opacity:.85; transform:translateY(-1px); }
button:active{ transform:translateY(0); }

.secondary{
    background:var(--card);
    color:var(--text);
    border:1px solid var(--border);
}

.danger{ background:var(--danger); }

.search{
    background:var(--card);
    color:var(--text);
    padding:8px 14px;
    border-radius:8px;
    border:1px solid var(--border);
    min-width:220px;
    font-size:13px;
    transition:border-color .15s;
}

.search:focus{ border-color:var(--accent); }

#board{
    display:flex;
    gap:18px;
    padding:24px 20px;
    overflow-x:auto;
    align-items:flex-start;
    min-height:calc(100vh - var(--header-height));
    position:relative;
    z-index:1;
}

/* ── columns ── */
.column{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    width:300px;
    min-width:300px;
    box-shadow:var(--shadow);
    display:flex;
    flex-direction:column;
    animation:colIn .25s ease both;
}

@keyframes colIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
}

.column-header{
    padding:14px 14px 14px 16px;
    border-bottom:1px solid var(--border);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    cursor:grab;
    border-radius:14px 14px 0 0;
}

.todo-column .column-header{
    border-left:3px solid var(--todo);
    background:linear-gradient(90deg,rgba(167,139,250,.06) 0%,transparent 100%);
}

.column-title{
    font-weight:700;
    font-size:14px;
    letter-spacing:.3px;
    text-transform:uppercase;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:8px;
}

.col-count{
    background:var(--border);
    color:var(--muted);
    font-size:11px;
    font-weight:600;
    padding:1px 7px;
    border-radius:20px;
    font-family:'IBM Plex Mono',monospace;
}

.todo-column .col-count{ background:rgba(167,139,250,.15); color:var(--todo); }

.column-actions{
    display:flex;
    gap:6px;
}

.column-body{
    padding:12px;
    display:flex;
    flex-direction:column;
    gap:8px;
    min-height:80px;
}

/* ── bookmarks ── */
.bookmark{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:11px 12px;
    cursor:grab;
    transition:.15s;
    touch-action:none;
    animation:bmIn .2s ease both;
}

@keyframes bmIn{
    from{ opacity:0; transform:translateX(-6px); }
    to{ opacity:1; transform:translateX(0); }
}

.bookmark:hover{ border-color:var(--accent); transform:translateY(-1px); }

.bookmark-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
}

.bookmark-title{
    font-weight:600;
    font-size:13.5px;
    word-break:break-word;
    min-width:0;
}

.bookmark a{
    color:inherit;
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:6px;
}

.bookmark a:hover{ color:var(--accent); }

.bookmark-controls{
    display:flex;
    gap:4px;
    flex-shrink:0;
    opacity:0;
    transition:.15s;
}

.bookmark:hover .bookmark-controls{ opacity:1; }

.favicon{
    width:15px;
    height:15px;
    border-radius:3px;
    object-fit:contain;
    flex-shrink:0;
}

.fallback-favicon{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:15px;
    height:15px;
    font-size:12px;
    flex-shrink:0;
}

.icon-btn{
    width:28px;
    height:28px;
    border-radius:7px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--muted);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:13px;
    padding:0;
    transition:.15s;
}

.icon-btn:hover{
    background:var(--border);
    color:var(--text);
    transform:none;
    opacity:1;
}

.empty{
    text-align:center;
    color:var(--muted);
    padding:20px;
    font-size:13px;
}

/* ── todo items ── */
.todo-item{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    cursor:grab;
    transition:.15s;
    touch-action:none;
    display:flex;
    align-items:center;
    gap:10px;
    animation:bmIn .2s ease both;
}

.todo-item:hover{ border-color:var(--todo); transform:translateY(-1px); }

.todo-item.done{
    opacity:.5;
}

.todo-checkbox{
    width:18px;
    height:18px;
    border-radius:5px;
    border:2px solid var(--border);
    background:transparent;
    cursor:pointer;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.15s;
    font-size:11px;
    padding:0;
    color:transparent;
}

.todo-item.done .todo-checkbox{
    background:var(--todo);
    border-color:var(--todo);
    color:white;
}

.todo-text{
    flex:1;
    font-size:13.5px;
    font-weight:500;
    word-break:break-word;
    transition:text-decoration .15s;
}

.todo-item.done .todo-text{
    text-decoration:line-through;
    color:var(--muted);
}

.todo-controls{
    display:flex;
    gap:4px;
    flex-shrink:0;
    opacity:0;
    transition:.15s;
}

.todo-item:hover .todo-controls{ opacity:1; }

/* quick-add row */
.quick-add{
    display:flex;
    gap:6px;
    padding:8px 12px 12px;
}

.quick-add input{
    flex:1;
    padding:8px 10px;
    border-radius:8px;
    background:var(--card);
    color:var(--text);
    border:1px solid var(--border);
    font-size:13px;
    transition:border-color .15s;
}

.quick-add input:focus{ border-color:var(--todo); outline:none; }

.quick-add input::placeholder{ color:var(--muted); }

.todo-add-btn{
    width:32px;
    height:32px;
    border-radius:8px;
    background:var(--todo);
    color:white;
    border:none;
    cursor:pointer;
    font-size:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    padding:0;
    line-height:1;
    transition:.15s;
}

.todo-add-btn:hover{ opacity:.85; transform:translateY(-1px); }

/* ── modals ── */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
    padding:20px;
    backdrop-filter:blur(4px);
}

.modal.active{ display:flex; }

.modal-content{
    background:var(--panel);
    width:100%;
    max-width:440px;
    border-radius:16px;
    border:1px solid var(--border);
    padding:24px;
    box-shadow:var(--shadow);
    animation:modalIn .2s ease;
}

@keyframes modalIn{
    from{ opacity:0; transform:scale(.96) translateY(8px); }
    to{ opacity:1; transform:scale(1) translateY(0); }
}

.modal-content h2{
    font-size:16px;
    font-weight:700;
    margin-bottom:18px;
    font-family:'IBM Plex Mono',monospace;
    color:var(--accent);
}

.field{ margin-bottom:14px; }

.field label{
    display:block;
    margin-bottom:6px;
    color:var(--muted);
    font-size:12px;
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:.5px;
}

.field input{
    width:100%;
    padding:10px 12px;
    border-radius:8px;
    background:var(--card);
    color:var(--text);
    border:1px solid var(--border);
    font-size:14px;
    transition:border-color .15s;
}

.field input:focus{ border-color:var(--accent); outline:none; }

.modal-actions{
    display:flex;
    justify-content:flex-end;
    gap:8px;
    margin-top:20px;
}

/* progress bar for todo */
.todo-progress{
    padding:4px 12px 8px;
    display:flex;
    align-items:center;
    gap:8px;
}

.progress-bar{
    flex:1;
    height:4px;
    background:var(--border);
    border-radius:99px;
    overflow:hidden;
}

.progress-fill{
    height:100%;
    background:var(--todo);
    border-radius:99px;
    transition:width .3s ease;
}

.progress-label{
    font-size:11px;
    color:var(--muted);
    font-family:'IBM Plex Mono',monospace;
    flex-shrink:0;
}

footer{
    padding:16px 20px 28px;
    color:var(--muted);
    font-size:12px;
    position:relative;
    z-index:1;
    font-family:'IBM Plex Mono',monospace;
}

.sortable-ghost{ opacity:.3; }
.sortable-drag{ transform:rotate(1.5deg); box-shadow:0 8px 32px rgba(0,0,0,.3); }

@media(max-width:700px){
    .column{ min-width:88vw; }
    .search{ min-width:100%; order:-1; }
    header{ height:auto; padding:12px; }
}

</style>
</head>

<body>

<header>

<div class="logo-wrap">
    <span class="site-title"><span class="flipped">🪽</span>AMLinks🪽</span>
</div>

<div class="toolbar">

<input id="searchInput" class="search" placeholder="Search bookmarks…">

<button onclick="openCategoryModal()">+ Category</button>

<button class="secondary" id="themeBtn" onclick="toggleTheme()">🌙 Theme</button>

<button class="secondary" onclick="exportData()">⬇ Export</button>

<button class="secondary" onclick="document.getElementById('importFile').click()">⬆ Import</button>

<button class="danger" onclick="resetAll()">Reset</button>

<input type="file" id="importFile" hidden accept=".json">

</div>

</header>

<main id="board"></main>

<footer>AMLinks · Data stored in your browser's local storage</footer>

<!-- CATEGORY MODAL -->
<div class="modal" id="categoryModal">
<div class="modal-content">
<h2>// Create Category</h2>
<div class="field">
<label>Category Name</label>
<input id="categoryName">
</div>
<div class="modal-actions">
<button class="secondary" onclick="closeModals()">Cancel</button>
<button onclick="createCategory()">Create</button>
</div>
</div>
</div>

<!-- BOOKMARK MODAL -->
<div class="modal" id="bookmarkModal">
<div class="modal-content">
<h2 id="bookmarkModalTitle">// Add Bookmark</h2>
<div class="field">
<label>Name</label>
<input id="bookmarkName">
</div>
<div class="field">
<label>URL</label>
<input id="bookmarkURL" placeholder="https://example.com">
</div>
<div class="modal-actions">
<button class="secondary" onclick="closeModals()">Cancel</button>
<button onclick="saveBookmark()">Save</button>
</div>
</div>
</div>

<!-- TODO EDIT MODAL -->
<div class="modal" id="todoModal">
<div class="modal-content">
<h2 id="todoModalTitle">// Edit Task</h2>
<div class="field">
<label>Task</label>
<input id="todoEditText">
</div>
<div class="modal-actions">
<button class="secondary" onclick="closeModals()">Cancel</button>
<button onclick="saveTodoEdit()">Save</button>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<script>

// ── DEFAULT DATA (baked-in) ─────────────────────────────────────────────────

const DEFAULT_STATE = {
    theme:"dark",
    todoIndex:0,
    todo:{
        items:[]
    },
    categories:[
        {
            id:"088413da-ae19-4997-9b86-3f75f384b031",
            name:"Operations",
            bookmarks:[
                {id:"696f1ddc-573e-4852-93a4-9a9606629907",name:"P1 Chat Ops",url:"https://chat.il4.dso.mil/"},
                {id:"08dd9c25-2726-4563-862d-76a628d1f05b",name:"SMS",url:"https://sms.transport.mil/"},
                {id:"f9de962b-5d8d-471b-a143-3615cfaf7f3c",name:"Onebrief",url:"https://onebrief.il5.afwerx.dso.mil/"},
                {id:"4cce9864-6035-4212-95a1-8ba0a8134883",name:"TACC",url:"https://tacc.us.af.mil/"},
                {id:"c87d8fd5-2a01-4e7e-b5c6-4b277557650a",name:"GDSS",url:"https://gdss.maf.ustranscom.mil/"},
                {id:"16c55ad9-9e7e-4659-8588-98058930b0e8",name:"Office Web Apps",url:"https://portal.apps.mil"},
                {id:"5a188237-8a04-4960-903a-9de8c1d219da",name:"AMC ePubs",url:"https://usaf.dps.mil/teams/12679/Aircrew%20Pubs%20Library/Forms/Better.aspx?CID=378a68c8%2D98b0%2D4836%2Db951%2D6bc5dfbeaf3b&FolderCTID=0x0120004E29D3C151194645806B4035F132FC90&id=%2Fteams%2F12679%2FAircrew%20Pubs%20Library%2FMaster%5FLibrary%5FVerified"},
                {id:"859630d6-2d1f-4e63-b3b5-e5d3cba2e164",name:"C2D2",url:"https://c2d2.apps.dso.mil/"},
                {id:"1394d782-c454-4c0f-8b3f-bbc242ec4b67",name:"Channels",url:"https://tacc.us.af.mil/Directorates/ALD/aldrd.cshtml"}
            ]
        },
        {
            id:"e9df2ad5-5814-47d1-855d-e6182409ece0",
            name:"Admin",
            bookmarks:[
                {id:"5c1a68bf-8f90-4e14-a675-87962744be92",name:"621 MSOS Sharepoint",url:"https://usaf.dps.mil/sites/621MSOS"},
                {id:"cde508c0-7068-46f4-9f8c-c4b33838fcdf",name:"AF Portal",url:"https://www.my.af.mil/gcss-af/USAF/ep/globalTab.do?channelPageId=s6925EC1356510FB5E044080020E329A9"},
                {id:"2283d426-0752-4a1f-8236-457006a945d8",name:"DTS",url:"https://dtsproweb.defensetravel.osd.mil/dts-app/pubsite/all/view"},
                {id:"8e66f30e-a1cd-42b2-ba37-94640355e590",name:"OKTA",url:"https://af.okta.mil/"},
                {id:"4b605e71-b436-48f5-ad3c-4d6690ec3c42",name:"myFSS",url:"https://myfss.us.af.mil/USAFCommunity/s/login/"},
                {id:"2146d716-d45a-4055-91ae-0f79dea0e1eb",name:"Leaveweb",url:"https://leave.af.mil/"},
                {id:"e71e6ecd-434b-4823-9d8e-378970d82e29",name:"Puckboard",url:"https://puckboard.apps.dso.mil/"},
                {id:"fb68a3ac-97ba-47d6-bdd1-f94018f23aac",name:"myPay",url:"https://mypay.dfas.mil/"}
            ]
        },
        {
            id:"2faa9f10-ea5a-49da-8c5a-e6228636e0ea",
            name:"Readiness",
            bookmarks:[
                {id:"b6654fe0-29c3-4d3f-ba3d-b32b0d6ef942",name:"myLearning",url:"https://lms-jets.cce.af.mil/moodle/"},
                {id:"6c9b6805-8f80-4850-b550-1f7dac835abd",name:"Envision",url:"https://envision.af.mil/"},
                {id:"ee7f3709-bbd3-4492-8bca-fe75aebc8871",name:"myIMR",url:"https://asimsimr.health.mil/imr/myIMR.aspx"}
            ]
        },
        {
            id:"b5b4cf62-4b32-477c-b72a-9c6aa5fead85",
            name:"DOM",
            bookmarks:[
                {id:"78130e25-7532-47d0-8c2b-75e249bddf28",name:"Asset Panda",url:"https://login.assetpanda.com/users/sign_in"}
            ]
        }
    ]
};

// ── STATE ───────────────────────────────────────────────────────────────────

function loadState(){
    const saved = localStorage.getItem("AMLinks");
    if(saved){
        try{
            const parsed = JSON.parse(saved);
            // migrate: ensure todo exists
            if(!parsed.todo) parsed.todo = {items:[]};
            if(parsed.todoIndex === undefined) parsed.todoIndex = 0;
            return parsed;
        }catch(e){}
    }
    return JSON.parse(JSON.stringify(DEFAULT_STATE));
}

let state = loadState();

let activeCategoryId = null;
let editingBookmark = null;
let editingTodoId = null;

applyTheme();
render();

// ── PERSISTENCE ─────────────────────────────────────────────────────────────

function save(){
    localStorage.setItem("AMLinks", JSON.stringify(state));
}

function applyTheme(){
    document.body.classList.toggle("light", state.theme === "light");
    const btn = document.getElementById("themeBtn");
    if(btn) btn.textContent = (state.theme === "light" ? "🌙" : "☀️") + " Theme";
}

function toggleTheme(){
    state.theme = state.theme === "dark" ? "light" : "dark";
    applyTheme();
    save();
}

// ── RENDER ───────────────────────────────────────────────────────────────────

function render(){
    const board = document.getElementById("board");
    board.innerHTML = "";

    const search = document.getElementById("searchInput").value.toLowerCase();

    // Build an ordered list of "slots": each is either a category id or "todo"
    // state.todoIndex is clamped to valid range
    const total = state.categories.length + 1; // +1 for todo
    const todoIdx = Math.max(0, Math.min(state.todoIndex ?? 0, total - 1));

    const slots = [];
    let catI = 0;
    for(let i = 0; i < total; i++){
        if(i === todoIdx){
            slots.push("todo");
        } else {
            slots.push(state.categories[catI++]);
        }
    }

    slots.forEach(slot => {
        if(slot === "todo"){
            board.appendChild(buildTodoColumn(search));
        } else {
            board.appendChild(buildCategoryColumn(slot, search));
        }
    });

    initializeSortable();
    save();
}

function buildCategoryColumn(category, search){
    const column = document.createElement("div");
    column.className = "column";
    column.dataset.id = category.id;

    const visibleBookmarks = category.bookmarks.filter(b =>
        b.name.toLowerCase().includes(search) || b.url.toLowerCase().includes(search)
    );

    column.innerHTML = `
        <div class="column-header">
            <div class="column-title">
                ${escapeHTML(category.name)}
                <span class="col-count">${visibleBookmarks.length}</span>
            </div>
            <div class="column-actions">
                <button class="icon-btn" title="Add bookmark" onclick="openBookmarkModal('${category.id}')">+</button>
                <button class="icon-btn" title="Rename" onclick="renameCategory('${category.id}')">✎</button>
                <button class="icon-btn" title="Delete" onclick="deleteCategory('${category.id}')">🗑</button>
            </div>
        </div>
        <div class="column-body" data-category-id="${category.id}">
            ${visibleBookmarks.length
                ? visibleBookmarks.map(b => bookmarkHTML(b, category.id)).join("")
                : `<div class="empty">No bookmarks yet</div>`}
        </div>
        <div class="quick-add">
            <input
                placeholder="Paste URL or name…"
                data-quick-url="${category.id}"
                onkeydown="handleQuickAdd(event,'${category.id}')"
            >
        </div>
    `;
    return column;
}

function buildTodoColumn(search){
    const items = state.todo.items;
    const filtered = search
        ? items.filter(i => i.text.toLowerCase().includes(search))
        : items;

    const done = filtered.filter(i => i.done).length;
    const total = filtered.length;
    const pct = total ? Math.round((done/total)*100) : 0;

    const col = document.createElement("div");
    col.className = "column todo-column";
    col.dataset.todoCol = "1";

    col.innerHTML = `
        <div class="column-header">
            <div class="column-title">
                ✅ To Do
                <span class="col-count">${done}/${total}</span>
            </div>
            <div class="column-actions">
                <button class="icon-btn" title="Clear completed" onclick="clearDoneTodos()">🗑</button>
            </div>
        </div>
        ${total > 0 ? `
        <div class="todo-progress">
            <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
            <span class="progress-label">${pct}%</span>
        </div>` : ''}
        <div class="column-body" id="todoBody">
            ${filtered.length
                ? filtered.map(item => todoItemHTML(item)).join("")
                : `<div class="empty">No tasks yet</div>`}
        </div>
        <div class="quick-add">
            <input
                id="todoQuickAdd"
                placeholder="Add a task and hit Enter…"
                onkeydown="handleTodoQuickAdd(event)"
            >
            <button class="todo-add-btn" onclick="commitTodoQuickAdd()" title="Add task">+</button>
        </div>
    `;
    return col;
}

function todoItemHTML(item){
    return `
        <div class="todo-item${item.done?' done':''}" data-todo-id="${item.id}">
            <button
                class="todo-checkbox"
                onclick="toggleTodo('${item.id}')"
                title="${item.done?'Mark incomplete':'Mark complete'}"
            >${item.done?'✓':''}</button>
            <span class="todo-text">${escapeHTML(item.text)}</span>
            <div class="todo-controls">
                <button class="icon-btn" onclick="openTodoEdit('${item.id}')" title="Edit">✎</button>
                <button class="icon-btn" onclick="deleteTodo('${item.id}')" title="Delete">🗑</button>
            </div>
        </div>
    `;
}

function bookmarkHTML(bookmark, categoryId){
    return `
        <div class="bookmark" data-bookmark-id="${bookmark.id}">
            <div class="bookmark-top">
                <div class="bookmark-title">
                    <a href="${escapeHTML(bookmark.url)}" target="_blank" rel="noopener">
                        ${favicon(bookmark.url)}
                        ${escapeHTML(bookmark.name)}
                    </a>
                </div>
                <div class="bookmark-controls">
                    <button class="icon-btn" onclick="editBookmark('${categoryId}','${bookmark.id}')" title="Edit">✎</button>
                    <button class="icon-btn" onclick="deleteBookmark('${categoryId}','${bookmark.id}')" title="Delete">🗑</button>
                </div>
            </div>
        </div>
    `;
}

// ── QUICK ADD (bookmarks via Enter) ─────────────────────────────────────────

function handleQuickAdd(event, categoryId){
    if(event.key === 'Enter'){
        const input = event.target;
        const val = input.value.trim();
        if(!val) return;

        let url = val;
        let name = val;

        // if it looks like a URL, use domain as name
        if(/^https?:\/\//i.test(val) || val.includes('.')){
            if(!/^https?:\/\//i.test(url)) url = 'https://' + url;
            try{
                name = new URL(url).hostname.replace('www.','');
            }catch(e){ name = val; }
        }

        const category = state.categories.find(c => c.id === categoryId);
        category.bookmarks.push({
            id: crypto.randomUUID(),
            name,
            url
        });
        input.value = '';
        render();
    }
}

// ── TODO ACTIONS ─────────────────────────────────────────────────────────────

function handleTodoQuickAdd(event){
    if(event.key === 'Enter') commitTodoQuickAdd();
}

function commitTodoQuickAdd(){
    const input = document.getElementById('todoQuickAdd');
    if(!input) return;
    const text = input.value.trim();
    if(!text) return;
    state.todo.items.push({
        id: crypto.randomUUID(),
        text,
        done: false
    });
    input.value = '';
    render();
    // refocus the new quick-add input after re-render
    const newInput = document.getElementById('todoQuickAdd');
    if(newInput) newInput.focus();
}

function toggleTodo(id){
    const item = state.todo.items.find(i => i.id === id);
    if(item){ item.done = !item.done; render(); }
}

function openTodoEdit(id){
    const item = state.todo.items.find(i => i.id === id);
    if(!item) return;
    editingTodoId = id;
    document.getElementById('todoEditText').value = item.text;
    document.getElementById('todoModal').classList.add('active');
    setTimeout(()=> document.getElementById('todoEditText').focus(), 50);
}

function saveTodoEdit(){
    const text = document.getElementById('todoEditText').value.trim();
    if(!text) return;
    const item = state.todo.items.find(i => i.id === editingTodoId);
    if(item){ item.text = text; }
    closeModals();
    render();
}

function deleteTodo(id){
    state.todo.items = state.todo.items.filter(i => i.id !== id);
    render();
}

function clearDoneTodos(){
    const remaining = state.todo.items.filter(i => !i.done);
    if(remaining.length === state.todo.items.length) return;
    if(!confirm(`Remove ${state.todo.items.length - remaining.length} completed task(s)?`)) return;
    state.todo.items = remaining;
    render();
}

// ── SORTABLE ─────────────────────────────────────────────────────────────────

function initializeSortable(){
    const board = document.getElementById("board");

    // All columns (including todo) are draggable by their header
    new Sortable(board, {
        animation:200,
        ghostClass:"sortable-ghost",
        handle:".column-header",
        onEnd(evt){
            // Rebuild the logical order from the DOM after drag
            const cols = [...board.children];
            const newCategories = [];
            let newTodoIndex = 0;
            let catPos = 0;
            cols.forEach((el, i) => {
                if(el.dataset.todoCol === "1"){
                    newTodoIndex = i;
                } else {
                    // find the category by id
                    const cat = state.categories.find(c => c.id === el.dataset.id);
                    if(cat) newCategories.push(cat);
                }
            });
            state.categories = newCategories;
            state.todoIndex = newTodoIndex;
            save();
        }
    });

    // bookmark drag within/between columns
    document.querySelectorAll(".column-body:not(#todoBody)").forEach(columnBody => {
        new Sortable(columnBody, {
            group:"bookmarks",
            animation:200,
            ghostClass:"sortable-ghost",
            onEnd(evt){
                const fromId = evt.from.dataset.categoryId;
                const toId = evt.to.dataset.categoryId;
                const from = state.categories.find(c => c.id === fromId);
                const to   = state.categories.find(c => c.id === toId);
                if(!from || !to) return;
                const [moved] = from.bookmarks.splice(evt.oldIndex, 1);
                to.bookmarks.splice(evt.newIndex, 0, moved);
                save();
            }
        });
    });

    // todo items drag reorder
    const todoBody = document.getElementById("todoBody");
    if(todoBody){
        new Sortable(todoBody, {
            animation:200,
            ghostClass:"sortable-ghost",
            onEnd(evt){
                const [moved] = state.todo.items.splice(evt.oldIndex, 1);
                state.todo.items.splice(evt.newIndex, 0, moved);
                save();
            }
        });
    }
}

// ── FAVICON ──────────────────────────────────────────────────────────────────

function favicon(url){
    try{
        const origin = new URL(url).origin;
        return `
            <img class="favicon" loading="lazy" src="${origin}/favicon.ico"
                onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='inline-flex';">
            <span class="fallback-favicon" style="display:none;">🔗</span>
        `;
    }catch{
        return `<span class="fallback-favicon">🔗</span>`;
    }
}

// ── CATEGORY ACTIONS ─────────────────────────────────────────────────────────

function openCategoryModal(){
    document.getElementById("categoryName").value = "";
    document.getElementById("categoryModal").classList.add("active");
    setTimeout(()=> document.getElementById("categoryName").focus(), 50);
}

function createCategory(){
    const name = document.getElementById("categoryName").value.trim();
    if(!name) return;
    state.categories.push({ id:crypto.randomUUID(), name, bookmarks:[] });
    closeModals();
    render();
}

function renameCategory(id){
    const cat = state.categories.find(c => c.id === id);
    const name = prompt("Rename category:", cat.name);
    if(name){ cat.name = name.trim(); render(); }
}

function deleteCategory(id){
    if(!confirm("Delete category and all bookmarks?")) return;
    state.categories = state.categories.filter(c => c.id !== id);
    render();
}

// ── BOOKMARK ACTIONS ─────────────────────────────────────────────────────────

function openBookmarkModal(categoryId){
    activeCategoryId = categoryId;
    editingBookmark = null;
    document.getElementById("bookmarkModalTitle").innerText = "// Add Bookmark";
    document.getElementById("bookmarkName").value = "";
    document.getElementById("bookmarkURL").value = "";
    document.getElementById("bookmarkModal").classList.add("active");
    setTimeout(()=> document.getElementById("bookmarkName").focus(), 50);
}

function editBookmark(categoryId, bookmarkId){
    const cat = state.categories.find(c => c.id === categoryId);
    const bm  = cat.bookmarks.find(b => b.id === bookmarkId);
    activeCategoryId = categoryId;
    editingBookmark = bookmarkId;
    document.getElementById("bookmarkModalTitle").innerText = "// Edit Bookmark";
    document.getElementById("bookmarkName").value = bm.name;
    document.getElementById("bookmarkURL").value = bm.url;
    document.getElementById("bookmarkModal").classList.add("active");
    setTimeout(()=> document.getElementById("bookmarkName").focus(), 50);
}

function saveBookmark(){
    const name = document.getElementById("bookmarkName").value.trim();
    let url    = document.getElementById("bookmarkURL").value.trim();
    if(!name || !url) return;
    if(!/^https?:\/\//i.test(url)) url = "https://" + url;

    const cat = state.categories.find(c => c.id === activeCategoryId);
    if(editingBookmark){
        const bm = cat.bookmarks.find(b => b.id === editingBookmark);
        bm.name = name; bm.url = url;
    }else{
        cat.bookmarks.push({ id:crypto.randomUUID(), name, url });
    }
    closeModals();
    render();
}

function deleteBookmark(categoryId, bookmarkId){
    const cat = state.categories.find(c => c.id === categoryId);
    cat.bookmarks = cat.bookmarks.filter(b => b.id !== bookmarkId);
    render();
}

// ── IMPORT / EXPORT / RESET ──────────────────────────────────────────────────

function exportData(){
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "AMLinks-backup.json";
    a.click();
}

document.getElementById("importFile").addEventListener("change", e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = event => {
        try{
            const parsed = JSON.parse(event.target.result);
            if(!parsed.categories) throw new Error("Invalid format");
            state = {
                theme: parsed.theme || "dark",
                todo: parsed.todo || { items:[] },
                categories: parsed.categories.map(c => ({
                    id: c.id || crypto.randomUUID(),
                    name: c.name || "Untitled",
                    bookmarks: Array.isArray(c.bookmarks)
                        ? c.bookmarks.map(b => ({
                            id: b.id || crypto.randomUUID(),
                            name: b.name || "Untitled",
                            url: b.url || ""
                          }))
                        : []
                }))
            };
            applyTheme();
            render();
            save();
            alert("Import successful ✔");
        }catch(err){
            console.error(err);
            alert("Import failed: invalid file format");
        }
    };
    reader.readAsText(file);
    e.target.value = "";
});

function resetAll(){
    if(!confirm("Reset everything to defaults?")) return;
    localStorage.removeItem("AMLinks");
    state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    applyTheme();
    render();
}

// ── MODALS ────────────────────────────────────────────────────────────────────

function closeModals(){
    document.querySelectorAll(".modal").forEach(m => m.classList.remove("active"));
}

window.onclick = e => {
    if(e.target.classList.contains("modal")) closeModals();
};

// Enter key support in modals
document.addEventListener("keydown", e => {
    if(e.key === "Escape") closeModals();
});

document.getElementById("bookmarkName").addEventListener("keydown", e => {
    if(e.key === "Enter") document.getElementById("bookmarkURL").focus();
});
document.getElementById("bookmarkURL").addEventListener("keydown", e => {
    if(e.key === "Enter") saveBookmark();
});
document.getElementById("categoryName").addEventListener("keydown", e => {
    if(e.key === "Enter") createCategory();
});

// ── SEARCH ────────────────────────────────────────────────────────────────────

document.getElementById("searchInput").addEventListener("input", render);

// ── UTILS ─────────────────────────────────────────────────────────────────────

function escapeHTML(str){
    return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;");
}
